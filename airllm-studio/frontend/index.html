<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AirLLM Studio | Next-Gen AI</title>
    <!-- Google Fonts: Inter & JetBrains Mono -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-dark: #050505;
            --glass-bg: rgba(20, 20, 25, 0.65);
            --glass-border: rgba(255, 255, 255, 0.08);
            --primary: #00f2ea; /* Neon Cyan */
            --secondary: #ff0055; /* Neon Pink */
            --accent: #7000ff; /* Electric Purple */
            --text-main: #ffffff;
            --text-dim: #a0a0a0;
            --success: #00ff9d;
            --font-main: 'Inter', sans-serif;
            --font-code: 'JetBrains Mono', monospace;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; scrollbar-width: thin; scrollbar-color: var(--primary) var(--bg-dark); }
        
        body {
            background-color: var(--bg-dark);
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(112, 0, 255, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(0, 242, 234, 0.1) 0%, transparent 40%);
            color: var(--text-main);
            font-family: var(--font-main);
            height: 100vh;
            overflow: hidden;
            display: flex;
        }

        /* --- Sidebar --- */
        .sidebar {
            width: 280px;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border-right: 1px solid var(--glass-border);
            display: flex;
            flex-direction: column;
            padding: 20px;
            z-index: 10;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 800;
            background: linear-gradient(45deg, var(--primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            gap: 10px;
            text-shadow: 0 0 20px rgba(0, 242, 234, 0.3);
        }

        .system-stats {
            background: rgba(0,0,0,0.3);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 20px;
            border: 1px solid var(--glass-border);
        }

        .stat-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 0.85rem;
            color: var(--text-dim);
        }
        .stat-val { color: var(--primary); font-family: var(--font-code); font-weight: bold; }

        .nav-btn {
            background: transparent;
            border: none;
            color: var(--text-dim);
            padding: 12px 15px;
            text-align: left;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .nav-btn:hover, .nav-btn.active {
            background: rgba(0, 242, 234, 0.1);
            color: var(--primary);
            box-shadow: 0 0 15px rgba(0, 242, 234, 0.1);
        }

        /* --- Main Content --- */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .header {
            height: 70px;
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 30px;
            background: rgba(5, 5, 5, 0.5);
        }

        .model-status {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.9rem;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #333;
            box-shadow: 0 0 10px #333;
            transition: all 0.3s;
        }
        .status-dot.loaded { background: var(--success); box-shadow: 0 0 15px var(--success); }
        .status-dot.loading { background: var(--secondary); animation: pulse 1s infinite; }

        @keyframes pulse { 0% { opacity: 0.5; } 100% { opacity: 1; } }

        /* --- Panels --- */
        .content-area {
            flex: 1;
            padding: 30px;
            overflow-y: auto;
            display: none; /* JS ile açılacak */
        }
        .content-area.active { display: block; animation: fadeIn 0.4s ease; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* --- Model Cards --- */
        .models-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }

        .model-card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 20px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            cursor: pointer;
        }

        .model-card:hover {
            transform: translateY(-5px);
            border-color: var(--primary);
            box-shadow: 0 10px 30px rgba(0, 242, 234, 0.15);
        }

        .model-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 4px; height: 100%;
            background: var(--primary);
            opacity: 0;
            transition: opacity 0.3s;
        }
        .model-card:hover::before { opacity: 1; }

        .card-header { display: flex; justify-content: space-between; margin-bottom: 10px; }
        .card-title { font-weight: 700; font-size: 1.1rem; color: #fff; }
        .card-size { 
            background: rgba(255,255,255,0.1); 
            padding: 4px 8px; 
            border-radius: 6px; 
            font-size: 0.75rem; 
            font-family: var(--font-code);
            color: var(--primary);
        }

        .card-desc { color: var(--text-dim); font-size: 0.85rem; margin-bottom: 15px; line-height: 1.4; }

        .load-btn {
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 8px;
            background: linear-gradient(90deg, var(--accent), var(--secondary));
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: filter 0.3s;
        }
        .load-btn:hover { filter: brightness(1.2); }
        .load-btn:disabled { background: #333; cursor: not-allowed; opacity: 0.7; }

        /* --- Progress Bar --- */
        .progress-container {
            margin-top: 15px;
            background: rgba(0,0,0,0.5);
            height: 6px;
            border-radius: 3px;
            overflow: hidden;
            display: none;
        }
        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--success));
            width: 0%;
            transition: width 0.3s ease;
            box-shadow: 0 0 10px var(--primary);
        }
        .progress-text {
            font-size: 0.75rem;
            color: var(--text-dim);
            margin-top: 5px;
            text-align: right;
            font-family: var(--font-code);
        }

        /* --- Chat Interface --- */
        .chat-container {
            display: flex;
            flex-direction: column;
            height: 100%;
            background: var(--glass-bg);
            border-radius: 20px;
            border: 1px solid var(--glass-border);
            overflow: hidden;
        }
        .chat-messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .message {
            max-width: 80%;
            padding: 12px 18px;
            border-radius: 12px;
            line-height: 1.5;
            animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes popIn { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        
        .msg-user {
            align-self: flex-end;
            background: linear-gradient(135deg, var(--accent), var(--secondary));
            color: white;
            border-bottom-right-radius: 2px;
        }
        .msg-ai {
            align-self: flex-start;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--glass-border);
            color: var(--text-main);
            border-bottom-left-radius: 2px;
        }

        .chat-input-area {
            padding: 20px;
            background: rgba(0,0,0,0.3);
            display: flex;
            gap: 10px;
        }
        .chat-input {
            flex: 1;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--glass-border);
            padding: 15px;
            border-radius: 12px;
            color: white;
            font-family: var(--font-main);
            outline: none;
            transition: border 0.3s;
        }
        .chat-input:focus { border-color: var(--primary); }
        .send-btn {
            background: var(--primary);
            border: none;
            width: 50px;
            border-radius: 12px;
            color: #000;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .send-btn:hover { transform: scale(1.05); }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-dark); }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--primary); }

    </style>
</head>
<body>

    <!-- Sidebar -->
    <div class="sidebar">
        <div class="logo">
            <i class="fa-solid fa-atom"></i> AirLLM Studio
        </div>

        <div class="system-stats">
            <div class="stat-row">
                <span><i class="fa-solid fa-memory"></i> RAM</span>
                <span class="stat-val" id="ram-display">0 / 0 GB</span>
            </div>
            <div class="stat-row">
                <span><i class="fa-solid fa-microchip"></i> GPU</span>
                <span class="stat-val" id="gpu-display">N/A</span>
            </div>
            <div class="stat-row">
                <span><i class="fa-solid fa-bolt"></i> Load</span>
                <span class="stat-val" id="cpu-display">0%</span>
            </div>
        </div>

        <button class="nav-btn active" onclick="switchTab('models')">
            <i class="fa-solid fa-layer-group"></i> Modeller
        </button>
        <button class="nav-btn" onclick="switchTab('chat')">
            <i class="fa-solid fa-comments"></i> Sohbet
        </button>
        <button class="nav-btn" onclick="switchTab('settings')">
            <i class="fa-solid fa-gear"></i> Ayarlar
        </button>
    </div>

    <!-- Main Content -->
    <div class="main-content">
        <div class="header">
            <h2 id="page-title">Model Kütüphanesi</h2>
            <div class="model-status">
                <div class="status-dot" id="status-dot"></div>
                <span id="status-text">Model Yüklenmedi</span>
            </div>
        </div>

        <!-- Models Tab -->
        <div id="tab-models" class="content-area active">
            <h3 style="margin-bottom: 20px; color: var(--text-dim); font-weight: 400;">Yerel & Bulut Modelleri</h3>
            <div class="models-grid" id="models-container">
                <!-- JS ile doldurulacak -->
                <div style="grid-column: 1/-1; text-align: center; padding: 50px; color: var(--text-dim);">
                    <i class="fa-solid fa-circle-notch fa-spin"></i> Modeller taranıyor...
                </div>
            </div>
        </div>

        <!-- Chat Tab -->
        <div id="tab-chat" class="content-area">
            <div class="chat-container">
                <div class="chat-messages" id="chat-messages">
                    <div class="message msg-ai">
                        Merhaba! Ben AirLLM destekli yapay zeka asistanınızım. 
                        Lütfen önce 'Modeller' sekmesinden bir model yükleyin.
                    </div>
                </div>
                <div class="chat-input-area">
                    <input type="text" class="chat-input" id="user-input" placeholder="Mesajınızı yazın..." disabled>
                    <button class="send-btn" id="send-btn" disabled><i class="fa-solid fa-paper-plane"></i></button>
                </div>
            </div>
        </div>
        
        <!-- Settings Tab (Placeholder) -->
        <div id="tab-settings" class="content-area">
            <h3>Ayarlar</h3>
            <p style="color: var(--text-dim); margin-top: 10px;">Gelişmiş AirLLM konfigürasyonları burada olacak.</p>
        </div>
    </div>

    <script>
        let isModelLoaded = false;

        // Sayfa Yüklendiğinde
        document.addEventListener('DOMContentLoaded', () => {
            fetchSystemInfo();
            loadModels();
            setInterval(fetchSystemInfo, 5000); // Sistemi güncelle
        });

        // Sekme Değiştirme
        function switchTab(tabName) {
            document.querySelectorAll('.content-area').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(el => el.classList.remove('active'));
            
            document.getElementById(`tab-${tabName}`).classList.add('active');
            event.currentTarget.classList.add('active');
            
            const titles = { 'models': 'Model Kütüphanesi', 'chat': 'AI Sohbet', 'settings': 'Ayarlar' };
            document.getElementById('page-title').innerText = titles[tabName];
        }

        // Sistem Bilgisi Çekme
        async function fetchSystemInfo() {
            try {
                const res = await fetch('/api/system-info');
                const data = await res.json();
                
                document.getElementById('ram-display').innerText = `${data.ram_available_gb} / ${data.ram_total_gb} GB`;
                document.getElementById('cpu-display').innerText = `%${data.cpu_percent}`;
                
                if (data.cuda_available) {
                    document.getElementById('gpu-display').innerText = `${data.gpu_name} (${data.gpu_memory_total_gb}GB)`;
                    document.getElementById('gpu-display').style.color = 'var(--success)';
                } else {
                    document.getElementById('gpu-display').innerText = "CPU Mode";
                    document.getElementById('gpu-display').style.color = 'var(--text-dim)';
                }
            } catch (e) { console.error(e); }
        }

        // Modelleri Listeleme
        async function loadModels() {
            try {
                const res = await fetch('/api/models');
                const data = await res.json();
                const container = document.getElementById('models-container');
                container.innerHTML = '';

                const allModels = [...data.hf, ...data.local];

                if (allModels.length === 0) {
                    container.innerHTML = '<div style="grid-column:1/-1; text-align:center; padding:40px;">Hiç model bulunamadı. Klasörlerinizi kontrol edin.</div>';
                    return;
                }

                allModels.forEach(model => {
                    const card = document.createElement('div');
                    card.className = 'model-card';
                    card.innerHTML = `
                        <div class="card-header">
                            <span class="card-title">${model.name}</span>
                            <span class="card-size">${model.size_gb} GB</span>
                        </div>
                        <div class="card-desc">${model.desc || 'Yüksek performanslı dil modeli'}</div>
                        <button class="load-btn" onclick="loadModel('${model.name}', '${model.type}', ${model.size_gb}, this)">
                            <i class="fa-solid fa-download"></i> Yükle
                        </button>
                        <div class="progress-container" id="prog-${model.name.replace(/\//g, '-')}">
                            <div class="progress-bar"></div>
                            <div class="progress-text">Bekliyor...</div>
                        </div>
                    `;
                    container.appendChild(card);
                });
            } catch (e) {
                console.error(e);
                document.getElementById('models-container').innerHTML = 'Modeller yüklenirken hata oluştu.';
            }
        }

        // Model Yükleme (Stream)
        async function loadModel(name, type, size, btnElement) {
            if (isModelLoaded) {
                alert("Zaten bir model yüklü! Önce sayfayı yenileyin.");
                return;
            }

            btnElement.disabled = true;
            btnElement.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> Başlatılıyor...';
            
            const progContainer = document.getElementById(`prog-${name.replace(/\//g, '-')}`);
            const progBar = progContainer.querySelector('.progress-bar');
            const progText = progContainer.querySelector('.progress-text');
            progContainer.style.display = 'block';

            const statusDot = document.getElementById('status-dot');
            const statusText = document.getElementById('status-text');
            statusDot.className = 'status-dot loading';
            statusText.innerText = 'Yükleniyor...';

            try {
                const res = await fetch('/api/load-model', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ path: name, type: type, size_gb: size })
                });

                const reader = res.body.getReader();
                const decoder = new TextDecoder();

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    
                    const chunk = decoder.decode(value);
                    const lines = chunk.split('\n\n');
                    
                    for (const line of lines) {
                        if (line.startsWith('data: ')) {
                            const data = JSON.parse(line.slice(6));
                            
                            if (data.progress !== undefined) {
                                progBar.style.width = `${data.progress}%`;
                                progText.innerText = data.status;
                            }
                            
                            if (data.success === true) {
                                isModelLoaded = true;
                                statusDot.className = 'status-dot loaded';
                                statusText.innerText = `${name} Aktif`;
                                btnElement.innerHTML = '<i class="fa-solid fa-check"></i> Yüklendi';
                                btnElement.style.background = 'var(--success)';
                                
                                // Chat'i aktif et
                                document.getElementById('user-input').disabled = false;
                                document.getElementById('send-btn').disabled = false;
                                alert("Model başarıyla yüklendi! Sohbete geçebilirsiniz.");
                            } else if (data.success === false) {
                                throw new Error(data.status);
                            }
                        }
                    }
                }
            } catch (err) {
                progText.innerText = 'HATA: ' + err.message;
                progBar.style.background = 'var(--secondary)';
                statusDot.className = 'status-dot';
                statusText.innerText = 'Yükleme Başarısız';
                btnElement.disabled = false;
                btnElement.innerHTML = '<i class="fa-solid fa-triangle-exclamation"></i> Tekrar Dene';
            }
        }

        // Chat Gönderme
        document.getElementById('send-btn').addEventListener('click', sendMessage);
        document.getElementById('user-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });

        async function sendMessage() {
            const input = document.getElementById('user-input');
            const msg = input.value.trim();
            if (!msg) return;

            // Kullanıcı mesajını ekle
            addMessage(msg, 'user');
            input.value = '';

            // AI Cevap Alanı Oluştur
            const aiMsgDiv = document.createElement('div');
            aiMsgDiv.className = 'message msg-ai';
            aiMsgDiv.innerText = '...';
            document.getElementById('chat-messages').appendChild(aiMsgDiv);

            try {
                const res = await fetch('/api/chat', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ message: msg })
                });
                
                const reader = res.body.getReader();
                const decoder = new TextDecoder();
                let fullText = "";

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    
                    const chunk = decoder.decode(value);
                    const lines = chunk.split('\n\n');
                    
                    for (const line of lines) {
                        if (line.startsWith('data: ')) {
                            const data = JSON.parse(line.slice(6));
                            if (data.token) {
                                fullText += data.token;
                                aiMsgDiv.innerText = fullText;
                                // Otomatik scroll
                                const chatBox = document.getElementById('chat-messages');
                                chatBox.scrollTop = chatBox.scrollHeight;
                            }
                        }
                    }
                }
            } catch (err) {
                aiMsgDiv.innerText = "Hata oluştu: " + err.message;
            }
        }

        function addMessage(text, sender) {
            const div = document.createElement('div');
            div.className = `message msg-${sender}`;
            div.innerText = text;
            document.getElementById('chat-messages').appendChild(div);
            const chatBox = document.getElementById('chat-messages');
            chatBox.scrollTop = chatBox.scrollHeight;
        }
    </script>
</body>
</html>
