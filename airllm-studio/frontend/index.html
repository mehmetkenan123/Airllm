<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AirLLM Studio - Next Gen IDE</title>
    <style>
        :root {
            --bg-primary: #0d1117;
            --bg-secondary: #161b22;
            --bg-tertiary: #21262d;
            --border-color: #30363d;
            --text-primary: #c9d1d9;
            --text-secondary: #8b949e;
            --accent-color: #58a6ff;
            --success-color: #3fb950;
            --danger-color: #f85149;
            --sidebar-width: 260px;
            --header-height: 50px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        header {
            height: var(--header-height);
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            padding: 0 20px;
            justify-content: space-between;
        }

        .logo {
            font-size: 1.2rem;
            font-weight: bold;
            color: var(--accent-color);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .status-bar {
            display: flex;
            gap: 15px;
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .status-item {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--success-color);
        }

        /* Main Layout */
        .main-container {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* Sidebar */
        .sidebar {
            width: var(--sidebar-width);
            background: var(--bg-secondary);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
        }

        .sidebar-tabs {
            display: flex;
            border-bottom: 1px solid var(--border-color);
        }

        .tab-btn {
            flex: 1;
            padding: 12px;
            background: transparent;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s;
        }

        .tab-btn.active {
            color: var(--text-primary);
            border-bottom: 2px solid var(--accent-color);
        }

        .sidebar-content {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .file-tree-item {
            padding: 6px 10px;
            cursor: pointer;
            border-radius: 4px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
        }

        .file-tree-item:hover {
            background: var(--bg-tertiary);
        }

        .folder-icon { color: #d29922; }
        .file-icon { color: #58a6ff; }

        /* Editor Area */
        .editor-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--bg-primary);
        }

        .tabs-bar {
            display: flex;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border-color);
            overflow-x: auto;
        }

        .editor-tab {
            padding: 10px 20px;
            background: var(--bg-secondary);
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            border-right: 1px solid var(--border-color);
            min-width: 120px;
        }

        .editor-tab.active {
            background: var(--bg-primary);
            color: var(--text-primary);
        }

        .code-editor {
            flex: 1;
            background: var(--bg-primary);
            border: none;
            color: var(--text-primary);
            padding: 20px;
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 14px;
            line-height: 1.6;
            resize: none;
            outline: none;
        }

        /* Right Panel (Chat & Models) */
        .right-panel {
            width: 400px;
            background: var(--bg-secondary);
            border-left: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
        }

        .panel-header {
            padding: 15px;
            border-bottom: 1px solid var(--border-color);
            font-weight: bold;
        }

        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message {
            max-width: 85%;
            padding: 12px;
            border-radius: 8px;
            line-height: 1.5;
        }

        .message.user {
            align-self: flex-end;
            background: var(--accent-color);
            color: white;
        }

        .message.ai {
            align-self: flex-start;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
        }

        .chat-input-area {
            padding: 15px;
            border-top: 1px solid var(--border-color);
        }

        .chat-input {
            width: 100%;
            padding: 12px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: var(--text-primary);
            resize: none;
            outline: none;
            font-family: inherit;
        }

        .send-btn {
            width: 100%;
            margin-top: 10px;
            padding: 10px;
            background: var(--accent-color);
            border: none;
            border-radius: 6px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .send-btn:hover { opacity: 0.9; }

        /* Model List */
        .model-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .model-item {
            padding: 12px;
            background: var(--bg-tertiary);
            border-radius: 6px;
            border: 1px solid var(--border-color);
            cursor: pointer;
            transition: all 0.2s;
        }

        .model-item:hover {
            border-color: var(--accent-color);
        }

        .model-name {
            font-weight: bold;
            margin-bottom: 4px;
        }

        .model-info {
            font-size: 0.8rem;
            color: var(--text-secondary);
            display: flex;
            justify-content: space-between;
        }

        .badge {
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 0.75rem;
            background: var(--bg-secondary);
        }

        .badge.local { color: #3fb950; }
        .badge.hf { color: #fca325; }

        /* Terminal */
        .terminal-panel {
            height: 200px;
            background: #000;
            border-top: 1px solid var(--border-color);
            padding: 10px;
            font-family: 'Consolas', monospace;
            font-size: 13px;
            overflow-y: auto;
            color: #33ff00;
        }

        .terminal-input {
            background: transparent;
            border: none;
            color: #33ff00;
            width: 100%;
            outline: none;
            font-family: inherit;
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-primary); }
        ::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-secondary); }

        .hidden { display: none !important; }
    </style>
</head>
<body>
    <header>
        <div class="logo">
            <span>🚀</span> AirLLM Studio
        </div>
        <div class="status-bar">
            <div class="status-item">
                <div class="status-dot"></div>
                <span id="server-status">Bağlı</span>
            </div>
            <div class="status-item">
                <span id="model-status">Model: Yok</span>
            </div>
            <div class="status-item">
                <span id="ram-status">RAM: --</span>
            </div>
        </div>
    </header>

    <div class="main-container">
        <!-- Sol Panel: Dosya Gezgini -->
        <div class="sidebar">
            <div class="sidebar-tabs">
                <button class="tab-btn active" onclick="switchTab('files')">📁 Dosyalar</button>
                <button class="tab-btn" onclick="switchTab('models')">🤖 Modeller</button>
            </div>
            
            <div id="files-content" class="sidebar-content">
                <div style="padding: 10px; color: var(--text-secondary); font-size: 0.9rem;">
                    Çalışma dizini yükleniyor...
                </div>
            </div>
            
            <div id="models-content" class="sidebar-content hidden">
                <div class="model-list" id="model-list-container">
                    <!-- Modeller buraya yüklenecek -->
                </div>
            </div>
        </div>

        <!-- Orta Panel: Editör -->
        <div class="editor-area">
            <div class="tabs-bar" id="editor-tabs">
                <!-- Sekmeler buraya -->
            </div>
            <textarea class="code-editor" id="code-editor" placeholder="Kod yazmaya başlayın veya bir dosya açın..."></textarea>
            <div class="terminal-panel" id="terminal-output">
                <div>AirLLM Terminal v1.0 - Hazır</div>
                <div style="display: flex; margin-top: 5px;">
                    <span>></span>
                    <input type="text" class="terminal-input" id="terminal-input" placeholder="Komut girin..." onkeypress="handleTerminalKey(event)">
                </div>
            </div>
        </div>

        <!-- Sağ Panel: Sohbet -->
        <div class="right-panel">
            <div class="panel-header">
                💬 AI Asistan
            </div>
            <div class="chat-container" id="chat-container">
                <div class="message ai">
                    Merhaba! Ben AirLLM asistanınızım. Kodlarınızda size yardımcı olabilirim, sorularınızı yanıtlayabilirim. Hangi modeli kullanmak istersiniz?
                </div>
            </div>
            <div class="chat-input-area">
                <textarea class="chat-input" id="chat-input" rows="3" placeholder="Mesajınızı yazın..."></textarea>
                <button class="send-btn" onclick="sendMessage()">Gönder</button>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:5000/api';
        let currentFile = null;
        let openFiles = [];
        let activeModel = null;

        // Sayfa yüklendiğinde
        document.addEventListener('DOMContentLoaded', () => {
            loadFileTree();
            scanModels();
            updateSystemStatus();
        });

        // Sistem durumunu güncelle
        async function updateSystemStatus() {
            setInterval(() => {
                // RAM ve CPU bilgisi simülasyonu
                document.getElementById('ram-status').innerText = `RAM: ${Math.floor(Math.random() * 30 + 20)}%`;
            }, 3000);
        }

        // Sekme değiştirme
        function switchTab(tabName) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.sidebar-content').forEach(content => content.classList.add('hidden'));
            
            event.target.classList.add('active');
            document.getElementById(`${tabName}-content`).classList.remove('hidden');
            
            if (tabName === 'models') {
                scanModels();
            }
        }

        // Dosya ağacını yükle
        async function loadFileTree(path = '/workspace/airllm-studio') {
            try {
                const response = await fetch(`${API_BASE}/files/list`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({path: path})
                });
                
                const items = await response.json();
                
                const container = document.getElementById('files-content');
                container.innerHTML = '';
                
                // Geri butonu (kök dizin değilse)
                if (path !== '/workspace/airllm-studio') {
                    const backDiv = document.createElement('div');
                    backDiv.className = 'file-tree-item';
                    backDiv.innerHTML = `<span class="folder-icon">📁</span> ..`;
                    backDiv.onclick = () => {
                        const parentPath = path.substring(0, path.lastIndexOf('/'));
                        loadFileTree(parentPath || '/workspace/airllm-studio');
                    };
                    container.appendChild(backDiv);
                }
                
                items.forEach(item => {
                    const div = document.createElement('div');
                    div.className = 'file-tree-item';
                    div.innerHTML = `
                        <span class="${item.is_dir ? 'folder-icon' : 'file-icon'}">
                            ${item.is_dir ? '📁' : '📄'}
                        </span>
                        ${item.name}
                    `;
                    div.onclick = () => {
                        if (item.is_dir) {
                            loadFileTree(item.path);
                        } else {
                            openFile(item);
                        }
                    };
                    container.appendChild(div);
                });
            } catch (error) {
                console.error('Dosya yükleme hatası:', error);
                appendTerminal(`Hata: ${error.message}`, 'red');
            }
        }

        // Dosya aç
        async function openFile(file) {
            if (!openFiles.find(f => f.path === file.path)) {
                openFiles.push(file);
                renderTabs();
            }
            selectTab(file.path);
            
            // Dosya içeriğini yükle
            try {
                const response = await fetch(`${API_BASE}/files/read`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({path: file.path})
                });
                
                const data = await response.json();
                document.getElementById('code-editor').value = data.content || '';
                currentFile = file;
                appendTerminal(`📄 ${file.name} açıldı`);
            } catch (error) {
                console.error('Dosya okuma hatası:', error);
                document.getElementById('code-editor').value = `// Hata: ${error.message}`;
            }
        }

        // Sekmeleri render et
        function renderTabs() {
            const tabsContainer = document.getElementById('editor-tabs');
            tabsContainer.innerHTML = '';
            
            openFiles.forEach(file => {
                const btn = document.createElement('button');
                btn.className = `editor-tab ${currentFile && currentFile.path === file.path ? 'active' : ''}`;
                btn.innerText = file.name;
                btn.onclick = () => selectTab(file.path);
                tabsContainer.appendChild(btn);
            });
        }

        // Sekme seç
        function selectTab(filePath) {
            currentFile = openFiles.find(f => f.path === filePath);
            renderTabs();
            // Dosya içeriği zaten açık
        }

        // Dosya kaydet (Ctrl+S)
        async function saveCurrentFile() {
            if (!currentFile) {
                appendTerminal('⚠️ Kaydedilecek dosya açık değil', 'orange');
                return;
            }
            
            const content = document.getElementById('code-editor').value;
            
            try {
                const response = await fetch(`${API_BASE}/files/save`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        path: currentFile.path,
                        content: content
                    })
                });
                
                const result = await response.json();
                if (result.message) {
                    appendTerminal(`✅ ${currentFile.name} kaydedildi (${result.size} bytes)`);
                } else {
                    appendTerminal(`❌ Hata: ${result.error}`, 'red');
                }
            } catch (error) {
                appendTerminal(`❌ Kaydetme hatası: ${error.message}`, 'red');
            }
        }

        // Keyboard shortcut (Ctrl+S)
        document.addEventListener('keydown', (e) => {
            if ((e.ctrlKey || e.metaKey) && e.key === 's') {
                e.preventDefault();
                saveCurrentFile();
            }
        });

        // Modelleri tara
        async function scanModels() {
            try {
                const response = await fetch(`${API_BASE}/models/scan`);
                const data = await response.json();
                
                const container = document.getElementById('model-list-container');
                container.innerHTML = '';
                
                // Yerel modeller
                data.local.forEach(model => {
                    addModelItem(model, container);
                });
                
                // Hazır HF modelleri
                data.preset.forEach(model => {
                    addModelItem(model, container);
                });
                
                document.getElementById('model-status').innerText = `Toplam: ${data.total_found + data.preset.length} model`;
            } catch (error) {
                console.error('Model tarama hatası:', error);
            }
        }

        function addModelItem(model, container) {
            const div = document.createElement('div');
            div.className = 'model-item';
            div.innerHTML = `
                <div class="model-name">${model.name}</div>
                <div class="model-info">
                    <span>${model.size || '--'}</span>
                    <span class="badge ${model.type}">${model.type === 'local_scan' ? 'YEREL' : 'HUGGINGFACE'}</span>
                </div>
            `;
            div.onclick = () => loadModel(model);
            container.appendChild(div);
        }

        // Model yükle
        async function loadModel(model) {
            activeModel = model;
            document.getElementById('model-status').innerText = `Model: ${model.name}`;
            
            addChatMessage('ai', `${model.name} modeli yükleniyor... Lütfen bekleyin.`);
            
            try {
                const response = await fetch(`${API_BASE}/models/load`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        id: model.id,
                        path: model.path || model.repo
                    })
                });
                
                const result = await response.json();
                if (result.status === 'loading' || result.status === 'already_loaded') {
                    addChatMessage('ai', '✅ Model başarıyla yüklendi! Artık sohbet edebilirsiniz.');
                } else {
                    addChatMessage('ai', '⚠️ Model yüklenirken bir sorun oluştu: ' + (result.message || result.error));
                }
            } catch (error) {
                addChatMessage('ai', '❌ Bağlantı hatası: ' + error.message);
            }
        }

        // Mesaj gönder
        async function sendMessage() {
            const input = document.getElementById('chat-input');
            const message = input.value.trim();
            
            if (!message) return;
            
            addChatMessage('user', message);
            input.value = '';
            
            // AI cevabı
            try {
                const response = await fetch(`${API_BASE}/chat`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        message: message,
                        context: currentFile ? `Aktif dosya: ${currentFile.name}` : ''
                    })
                });
                
                const data = await response.json();
                addChatMessage('ai', data.response || data.error);
            } catch (error) {
                addChatMessage('ai', 'Bağlantı hatası: ' + error.message);
            }
        }

        // Chat'e mesaj ekle
        function addChatMessage(role, text) {
            const container = document.getElementById('chat-container');
            const div = document.createElement('div');
            div.className = `message ${role}`;
            div.innerText = text;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }

        // Terminal komutu
        function handleTerminalKey(event) {
            if (event.key === 'Enter') {
                const input = document.getElementById('terminal-input');
                const command = input.value.trim();
                
                if (command) {
                    appendTerminal(`> ${command}`);
                    
                    fetch(`${API_BASE}/terminal/run`, {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({command: command})
                    })
                    .then(res => res.json())
                    .then(data => {
                        if (data.stdout) appendTerminal(data.stdout);
                        if (data.stderr) appendTerminal(data.stderr, 'red');
                        if (data.error) appendTerminal(data.error, 'red');
                    })
                    .catch(err => appendTerminal('Hata: ' + err.message, 'red'));
                    
                    input.value = '';
                }
            }
        }

        function appendTerminal(text, color = '#33ff00') {
            const output = document.getElementById('terminal-output');
            const div = document.createElement('div');
            div.style.color = color;
            div.innerText = text;
            output.insertBefore(div, output.lastElementChild);
            output.scrollTop = output.scrollHeight;
        }

        // Sistem durumunu gerçek API'den çek
        async function fetchSystemInfo() {
            try {
                const response = await fetch(`${API_BASE}/system/info`);
                const info = await response.json();
                
                if (info.ram_percent) {
                    document.getElementById('ram-status').innerText = `RAM: ${info.ram_percent}%`;
                }
                
                if (info.model_loaded) {
                    document.getElementById('model-status').innerText = `Model: ${info.model_loaded}`;
                }
            } catch (error) {
                // Sessizce başarısız ol
            }
        }

        // Her 5 saniyede bir sistem bilgilerini güncelle
        setInterval(fetchSystemInfo, 5000);
    </script>
</body>
</html>
