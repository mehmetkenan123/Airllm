# Lefthook Git Hooks Configuration
commit-msg:
  commands:
    commitlint:
      run: npx --yes commitlint --edit {1}

pre-commit:
  parallel: true
  commands:
    lint:
      glob: '*.{ts,tsx,js,jsx}'
      run: pnpm biome check --staged {staged_files}
    format:
      glob: '*.{ts,tsx,js,jsx,json,md}'
      run: pnpm biome format --write {staged_files}

pre-push:
  commands:
    typecheck:
      run: pnpm turbo run typecheck --filter='...{push}'
    test:
      run: pnpm turbo run test --filter='...{push}'
